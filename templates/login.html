<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - College Helpdesk</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            width: 350px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #3f51b5;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3f51b5;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #303f9f;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .back-link {
            margin-top: 15px;
            display: block;
            text-decoration: none;
            color: #3f51b5;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Admin Login</h2>

    <form method="POST" action="/login">
        <input type="text" name="username" placeholder="Enter username" required>
        <input type="password" name="password" placeholder="Enter password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <a href="/" class="back-link">← Back to Chatbot</a>
</div>

</body>
</html>
