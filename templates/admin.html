<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - College Helpdesk</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f7fb;
            margin: 0;
            padding: 30px;
        }

        .container {
            width: 800px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
        }

        h2 {
            color: #3f51b5;
            text-align: center;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: crimson;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 8px;
        }

        input, textarea, button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            background: #3f51b5;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #303f9f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }

        th {
            background: #3f51b5;
            color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        .message {
            color: green;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="top-bar">
        <h2>Admin FAQ Management</h2>
        <a href="/logout" class="logout-btn">Logout</a>
    </div>

    <input type="text" id="question" placeholder="Enter question">
    <textarea id="answer" placeholder="Enter answer"></textarea>
    <button onclick="addFAQ()">Add FAQ</button>

    <p id="message" class="message"></p>

    <h3>Existing FAQs</h3>

    <table id="faq-table">
        <tr>
            <th>Question</th>
            <th>Answer</th>
        </tr>
    </table>

</div>

<script>
function loadFAQs() {
    fetch("/faqs")
    .then(response => response.json())
    .then(data => {
        let table = document.getElementById("faq-table");

        // Remove old rows except header
        while (table.rows.length > 1) {
            table.deleteRow(1);
        }

        data.forEach(faq => {
            let row = table.insertRow();

            row.insertCell(0).innerText = faq.question;
            row.insertCell(1).innerText = faq.answer;
        });
    })
    .catch(error => console.error(error));
}

function addFAQ() {
    const question = document.getElementById("question").value.trim();
    const answer = document.getElementById("answer").value.trim();

    if (!question || !answer) {
        alert("Please enter both question and answer.");
        return;
    }

    fetch("/add_faq", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            question: question,
            answer: answer
        })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("message").innerText = data.message;

        document.getElementById("question").value = "";
        document.getElementById("answer").value = "";

        loadFAQs();
    })
    .catch(error => console.error(error));
}

loadFAQs();
</script>

</body>
</html>
